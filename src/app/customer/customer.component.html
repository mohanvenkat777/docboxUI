<div class="breadcrum">
    <h1>Customers</h1>
    <div style="margin:auto;"></div>
    <ul class="pull-right btn-list">
        <li>
            <button mat-raised-button color="primary" routerLink="/main/AddCustomer">Add Customer</button>
        </li>
    </ul>
</div>
<div class="separator-breadcrumb border-top"></div>
<div class="row">
    <div class="col-md-12">
        <div class="card mb-4">
            <div class="card-body">
                <div class="form">
                    <div class="row">
                        <div class="col-md-12" *ngIf="this.dataSource.data.length != 0">
                            <mat-form-field>
                                <input matInput (keyup)="applyFilter($event.target.value)" placeholder="Filter">
                              </mat-form-field>
                        </div>
                        <div class="col-md-12">
                            <div class="table-responsive">
                                <table mat-table [dataSource]="dataSource">
                              
                                  <!-- Position Column -->
                                  <ng-container matColumnDef="id">
                                    <th mat-header-cell *matHeaderCellDef> S.No. </th>
                                    <td mat-cell *matCellDef="let element; let i = index;"> {{i+1}}  </td>
                                  </ng-container>

                                  <!-- Position Column -->
                                  <ng-container matColumnDef="name">
                                    <th mat-header-cell *matHeaderCellDef> Name </th>
                                    <td mat-cell *matCellDef="let element"> {{element.CustomerName}} </td>
                                  </ng-container>
                              
                                  

                                   <!-- Name Column -->
                                   <ng-container matColumnDef="phone">
                                    <th mat-header-cell *matHeaderCellDef> Reference No / Docket No  </th>
                                    <td mat-cell *matCellDef="let element"> {{element.CustomerRef}} </td>
                                  </ng-container>

                                  <!-- Name Column -->
                                  <ng-container matColumnDef="ref">
                                    <th mat-header-cell *matHeaderCellDef> Phone No</th>
                                    <td mat-cell *matCellDef="let element"> {{element.CustomerPone}} </td>
                                  </ng-container>

                                  <!-- Name Column -->
                                  <ng-container matColumnDef="date">
                                    <th mat-header-cell *matHeaderCellDef> Year</th>
                                    <td mat-cell *matCellDef="let element"> {{element.cMonth}}  {{element.cYear}} </td>
                                  </ng-container>

                                  <!-- Weight Column -->
                                  <ng-container matColumnDef="edit">
                                    <th mat-header-cell *matHeaderCellDef> Edit </th>
                                    <td mat-cell *matCellDef="let element"> 
                                        <button mat-stroked-button color="primary" (click)="edit(element.Id)"><i class="material-icons">
                                            create
                                        </i></button>    
                                    </td>
                                  </ng-container>

                                  <ng-container matColumnDef="add">
                                    <th mat-header-cell *matHeaderCellDef> Add Document </th>
                                    <td mat-cell *matCellDef="let element"> 
                                        <button mat-stroked-button color="primary" (click)="addDocument(element.CustomerID)">
                                            <span class="material-icons">
                                                add
                                                </span> Document
                                            </button>    
                                    </td>
                                  </ng-container>
                              
                                  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                                  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                                </table>
                                <mat-paginator [pageSizeOptions]="[20, 50, 100, 500]" showFirstLastButtons></mat-paginator>
                              </div>
                              <!-- Copyright 2019 Google LLC. All Rights Reserved.
                                  Use of this source code is governed by an MIT-style license that
                                  can be found in the LICENSE file at http://angular.io/license -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
